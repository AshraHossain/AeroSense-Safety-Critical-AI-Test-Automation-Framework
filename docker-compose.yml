version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: aerosense-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: aerosense
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aerosense-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aerosense-app
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/aerosense
      CLAUDE_MODEL: claude-sonnet-4-6
      PORT: 8000
      LOG_LEVEL: info
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aerosense-network
    volumes:
      - .:/app  # For development
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  aerosense-network:
    driver: bridge
