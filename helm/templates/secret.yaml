{{- if .Values.secrets.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: {{ include "aerosense.fullname" . }}-secret-store
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: {{ include "aerosense.fullname" . }}
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "aerosense.fullname" . }}-postgres
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ include "aerosense.fullname" . }}-secret-store
    kind: SecretStore
  target:
    name: {{ include "aerosense.fullname" . }}-postgres
    creationPolicy: Owner
  data:
  - secretKey: url
    remoteRef:
      key: aerosense/postgres/url
  - secretKey: password
    remoteRef:
      key: aerosense/postgres/password
{{- else }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aerosense.fullname" . }}-postgres
  labels:
    {{- include "aerosense.labels" . | nindent 4 }}
type: Opaque
data:
  url: {{ .Values.postgres.databaseUrl | b64enc | quote }}
  password: {{ .Values.postgres.password | b64enc | quote }}
{{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "aerosense.fullname" . }}-secrets
  labels:
    {{- include "aerosense.labels" . | nindent 4 }}
type: Opaque
data:
  anthropic-api-key: {{ .Values.secrets.anthropicApiKey | b64enc | quote }}
