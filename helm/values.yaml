replicaCount: 2

image:
  repository: aerosense-testforge
  tag: latest
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 8000
  targetPort: 8000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: aerosense.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

postgres:
  enabled: true
  replicas: 1
  storage: 10Gi

config:
  CLAUDE_MODEL: claude-sonnet-4-6
  LOG_LEVEL: info
  PORT: "8000"

secrets:
  externalSecrets:
    enabled: false
    backend: aws-secrets-manager
