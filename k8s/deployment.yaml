apiVersion: apps/v1
kind: Deployment
metadata:
  name: aerosense-app
  namespace: default
  labels:
    app: aerosense
    component: testforge
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aerosense
      component: testforge
  template:
    metadata:
      labels:
        app: aerosense
        component: testforge
    spec:
      containers:
      - name: app
        image: aerosense-testforge:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: url
        - name: CLAUDE_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: CLAUDE_MODEL
        - name: PORT
          value: "8000"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anthropic-secret
              key: api-key
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
