# Alembic Configuration
# Generated for AeroSense-TestForge

[alembic]
# PostgreSQL connection string (configured via DATABASE_URL environment variable)
sqlalchemy.url = postgresql://user:password@localhost/aerosense
script_location = alembic
sqlalchemy.echo = false
sqlalchemy.echo_pool = false
sqlalchemy.url_placeholder = %(asyncpg_url)s

[loggers]
keys = root,sqlalchemy.engine

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy.engine]
level = WARN
handlers =
qualname = sqlalchemy.engine

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
